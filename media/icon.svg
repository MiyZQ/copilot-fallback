<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>

  <!-- Robot head outline -->
  <rect x="34" y="38" width="60" height="50" rx="8" fill="none" stroke="url(#accent)" stroke-width="4"/>

  <!-- Robot eyes -->
  <circle cx="50" cy="58" r="6" fill="url(#accent)"/>
  <circle cx="78" cy="58" r="6" fill="url(#accent)"/>

  <!-- Robot antenna -->
  <line x1="64" y1="38" x2="64" y2="24" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="64" cy="18" r="6" fill="url(#accent)"/>

  <!-- Robot mouth/grid -->
  <rect x="48" y="72" width="32" height="8" rx="2" fill="none" stroke="url(#accent)" stroke-width="2"/>

  <!-- Lightning bolt (fallback symbol) -->
  <path d="M72 30 L58 52 L68 52 L56 74 L78 48 L66 48 L78 30 Z" fill="url(#accent)" opacity="0.9"/>

  <!-- Side brackets -->
  <path d="M22 52 L14 52 L14 76 L22 76" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M106 52 L114 52 L114 76 L106 76" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>